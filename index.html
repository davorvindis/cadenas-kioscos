  var storedById = {};
  for (var i = 0; i < stored.length; i++) {

var GEOCACHE_KEY = "espert_geocache_v2";

  try {

  } catch (e) {
    _geocache = {};
  }
  return _geocache;
}

  try {
    localStorage.setItem(GEOCACHE_KEY, JSON.stringify(_geocache));

}

  return new Promise(function (resolve) {
    var cache = loadGeocache();
    if (cache[address] !== undefined) {

    _geocodeQueue.push({
      address: address,
      resolve: resolve

    processGeocodeQueue();
  });

function processGeocodeQueue() {
  if (_geocoding || _geocodeQueue.length === 0) return;
  _geocoding = true;
  var item = _geocodeQueue.shift();
  var cache = loadGeocache();
  if (cache[item.address] !== undefined) {
    item.resolve(cache[item.address] || null);
    _geocoding = false;
    processGeocodeQueue();
    return;
  }
  var url = "https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(item.address + ", Argentina") + "&format=json&limit=1&countrycodes=ar";
  fetch(url, {
    headers: {
      "Accept-Language": "es"
    }
  }).then(function (r) {
    return r.json();
  }).then(function (d) {
    if (d && d[0]) {
      var res = {
        lat: parseFloat(d[0].lat),
        lng: parseFloat(d[0].lon)
      };
      _geocache[item.address] = res;
      saveGeocache();
      item.resolve(res);
    } else {
      _geocache[item.address] = false;
      saveGeocache();
      item.resolve(null);
    }
    _geocoding = false;
    // Nominatim usage policy: max 1 req/sec
    setTimeout(processGeocodeQueue, 1100);
  }).catch(function () {
    item.resolve(null);
    _geocoding = false;
    setTimeout(processGeocodeQueue, 1100);
  });
}
